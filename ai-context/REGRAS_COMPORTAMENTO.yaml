# Regras de Comportamento da IA

regras:
  atualizacao_atomica:
    descricao: "Após modificar qualquer arquivo de conteúdo"
    passos:
      - "Atualizar o arquivo"
      - "Atualizar cerebro/manifest.json"
      - "Atualizar cerebro/bootstrap.json"
      - "Atualizar CONTEXTO.md com timestamp"
      - "Se arquivo em narrativa/, atualizar narrativa/INDICE.md"

  cabecalhos:
    descricao: "Todo arquivo em biblia/, roteiro/, narrativa/ deve ter cabeçalho"
    formato: |
      ---
      id: "tipo_nome_contador"
      tipo: "cena|dialogo|local|personagem|lore|arco|ramificacao"
      status: "rascunho"
      ---

  ciclo_confirmacao:
    descricao: "Após cada ação que modifica o repositório"
    passos:
      - "Executar ação"
      - "Verificar conclusão"
      - "Reportar: Ação concluída e verificada: [resumo]"

  protecao:
    - "Não apagar pastas"
    - "Não apagar arquivos em cerebro/ (estado.json, dependencias.json, relacoes.json, busca.json, manifest.json, bootstrap.json, versoes.json)"
    - "Não apagar arquivos em ai-context/ (CONTEXTO.md, MEMORIA.md)"
    - "Apenas arquivos em biblia/, roteiro/, narrativa/ podem ser apagados ou modificados livremente"

  registro_progresso:
    descricao: "Ao final da sessão, registrar em CONTEXTO.md"
    itens:
      - "Resumo do que foi feito"
      - "Arquivos criados/modificados"
      - "Próxima tarefa"

  validacao_ids:
    padrao: "tipo_nome_contador (ex: cena_floresta_001)"
    acao: "Verificar unicidade em manifest.json antes de criar"

  recuperacao_contexto:
    descricao: "Se perder contexto durante trabalho"
    acoes:
      - "Reler CONTEXTO.md e MEMORIA.md"
      - "Reler arquivo específico sendo trabalhado"

## 0. Ambiente de Trabalho
Ao iniciar nova sessão:
1. Identificar o diretório real do repositório (onde está a pasta ai-context/)
2. Navegar para esse diretório usando cd
3. Não trabalhar no workspace temporário padrão
4. Executar o script inicializar.sh para carregar o sistema

  - "Não apagar ou modificar arquivos em ai-context/ (REGRAS_ESTRUTURA.yaml, REGRAS_COMPORTAMENTO.yaml, CONTEXTO.md, MEMORIA.md)"

  interpretacao_comandos:
    descricao: "Diferenciar perguntas de comandos"
    regras:
      - "Se a mensagem terminar com '?', é uma pergunta. Responda apenas com texto, não execute ações."
      - "Se a mensagem começar com um verbo de ação (crie, atualize, execute, faça, mostre, liste, adicione, registre), é um comando. Execute a ação."
      - "Em caso de dúvida, responda com texto e pergunte se deseja executar a ação."
