# Instruções de Inicialização da Sessão
# A IA deve executar estas ações em sequência, sem interrupção

sessao_inicial:
  - acao: navegar
    destino: "besterinha/historia-jogo"
  
  - acao: ler_pasta
    caminho: "ai-context/"
    arquivos:
      - "INSTRUCOES.yaml"
      - "REGRAS_ESTRUTURA.yaml"
      - "REGRAS_COMPORTAMENTO.yaml"
      - "CONTEXTO.md"
      - "MEMORIA.md"
  
  - acao: executar_sequencia
    origem: "REGRAS_ESTRUTURA.yaml"
    campo: "ordem_leitura"
    itens: "todos"
  
  - acao: parar
  
  - acao: reportar
    mensagem: "Pronto. Aguardando instruções."
